# ══════════════════════════════════════════════════════
# Framework Configuration
# All values can be overridden via Maven system properties
# Example: mvn test -Dbrowser=firefox -Denv=staging -Dheadless=true
# ══════════════════════════════════════════════════════

# Browser: chrome | firefox | edge
browser=chrome

# Run browser without UI (ideal for CI/CD pipelines)
headless=false

# Target environment: local | staging | production
env=staging

# Base application URL
base.url=https://the-internet.herokuapp.com

# Timeouts (in seconds)
implicit.wait=10
explicit.wait=20
page.load.timeout=30

# Capture screenshot when a scenario fails
screenshot.on.failure=true

# Retry count for flaky scenarios (0 = no retry)
retry.count=1

# Reports output directory
reports.dir=reports/extent
