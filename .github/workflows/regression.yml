name: Regression Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Runs every day at 6:00 AM UTC — nightly regression
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub UI with inputs
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chrome'
        type: choice
        options: [chrome, firefox, edge]
      tags:
        description: 'Cucumber tags filter'
        required: false
        default: '@regression'

jobs:
  test:
    name: Run ${{ github.event.inputs.tags || '@regression' }} on ${{ github.event.inputs.browser || 'chrome' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run tests (headless)
        run: |
          mvn test \
            -Dbrowser=${{ github.event.inputs.browser || 'chrome' }} \
            -Dheadless=true \
            -Dcucumber.filter.tags="${{ github.event.inputs.tags || '@regression' }}" \
            -Denv=staging \
            --no-transfer-progress
        continue-on-error: true

      - name: Create reports directory if missing
        if: always()
        run: mkdir -p reports/cucumber reports/extent reports/logs reports/screenshots

      - name: Upload Cucumber HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-report-${{ github.run_number }}
          path: reports/cucumber/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Extent HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extent-report-${{ github.run_number }}
          path: reports/extent/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Screenshots on Failure
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: failure-screenshots-${{ github.run_number }}
          path: reports/screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-logs-${{ github.run_number }}
          path: reports/logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Publish Test Results Summary
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: TestNG Results
          path: reports/cucumber/cucumber-report.xml
          reporter: java-junit
          fail-on-error: false
