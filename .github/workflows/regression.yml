name: Regression Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chrome'
        type: choice
        options: [chrome, firefox, edge]
      tags:
        description: 'Cucumber tags filter'
        required: false
        default: '@smoke'

jobs:
  build-and-validate:
    name: Build & Validate Framework
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Validate project structure
        run: mvn validate --no-transfer-progress

      - name: Compile source code
        run: mvn compile test-compile --no-transfer-progress

      - name: Display project structure
        run: |
          echo "✅ Framework compiled successfully!"
          echo ""
          echo "🧪 Feature Files:"
          find src -name "*.feature" | sort
          echo ""
          echo "☕ Java Classes:"
          find src -name "*.java" | sort

  test:
    name: Run Tests on Chrome
    runs-on: ubuntu-latest
    needs: build-and-validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Set up virtual display for Chrome
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2

      - name: Run tests
        run: |
          export DISPLAY=:99
          mvn test \
            -Dbrowser=chrome \
            -Dheadless=true \
            -Dcucumber.filter.tags="${{ github.event.inputs.tags || '@smoke' }}" \
            --no-transfer-progress
        continue-on-error: true

      - name: Create report directories
        if: always()
        run: mkdir -p reports/cucumber reports/extent reports/logs reports/screenshots

      - name: Upload Cucumber Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-report-${{ github.run_number }}
          path: reports/cucumber/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Extent Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extent-report-${{ github.run_number }}
          path: reports/extent/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-logs-${{ github.run_number }}
          path: reports/logs/
          retention-days: 7
          if-no-files-found: ignore
